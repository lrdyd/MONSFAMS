<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONSFAMS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; min-height: 100vh; background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 30%, #333333 50%, #2a2a2a 70%, #1a1a1a 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; color: white; overflow: hidden; }

        /* Meteor Canvas */
        #meteorCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }

        .container { text-align: center; max-width: 500px; width: 100%; position: relative; z-index: 1; }
        .logo { font-size: 3rem; font-weight: 800; letter-spacing: 8px; color: #f5f5f0; text-shadow: 0 0 30px rgba(245, 245, 240, 0.3); margin-bottom: 60px; }
        .subtitle { font-size: 0.9rem; color: rgba(255, 255, 255, 0.6); margin-top: 25px; letter-spacing: 3px; text-transform: uppercase; }
        .buttons { display: flex; flex-direction: column; gap: 15px; margin-top: 40px; }
        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 10px; padding: 14px 30px; font-size: 1rem; font-weight: 600; border: none; border-radius: 50px; cursor: pointer; text-decoration: none; transition: all 0.3s; position: relative; z-index: 1; }
        .btn-free { color: white; background: linear-gradient(135deg, #4CAF50, #45a049); box-shadow: 0 6px 20px rgba(76, 175, 80, 0.4); }
        .btn-free:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(76, 175, 80, 0.5); }
        .btn-premium { color: #1a1a1a; background: linear-gradient(135deg, #feca57, #ff9f43); box-shadow: 0 6px 20px rgba(254, 202, 87, 0.4); }
        .btn-premium:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(254, 202, 87, 0.5); }
        .btn-discord { color: white; background: linear-gradient(135deg, #5865F2, #4752C4); box-shadow: 0 6px 20px rgba(88, 101, 242, 0.4); }
        .btn-discord:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(88, 101, 242, 0.5); }
        .btn-tutorial { color: white; background: linear-gradient(135deg, #00b4d8, #0077b6); box-shadow: 0 6px 20px rgba(0, 180, 216, 0.4); }
        .btn-tutorial:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0, 180, 216, 0.5); }
        .btn-icon { width: 20px; height: 20px; }

        /* Admin Button */
        .admin-link { display: block; margin-top: 30px; color: rgba(255, 255, 255, 0.3); font-size: 0.8rem; text-decoration: none; transition: color 0.3s; position: relative; z-index: 1; }
        .admin-link:hover { color: rgba(255, 255, 255, 0.6); }

        /* Modal */
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.9); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.3s; }
        .modal.active { opacity: 1; visibility: visible; }
        .modal-content { background: linear-gradient(135deg, #2a2a2a, #333333); border: 1px solid rgba(254, 202, 87, 0.3); border-radius: 20px; padding: 40px; max-width: 350px; width: 90%; text-align: center; transform: scale(0.9); transition: transform 0.3s; }
        .modal.active .modal-content { transform: scale(1); }
        .modal-icon { width: 60px; height: 60px; background: linear-gradient(135deg, #feca57, #ff9f43); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 30px; }
        .modal-title { font-size: 1.3rem; font-weight: 700; color: white; margin-bottom: 10px; }
        .modal-desc { font-size: 0.9rem; color: rgba(255, 255, 255, 0.6); margin-bottom: 25px; }
        .modal-input { width: 100%; padding: 14px 18px; font-size: 1rem; color: white; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 12px; outline: none; margin-bottom: 15px; transition: all 0.3s; }
        .modal-input:focus { border-color: #feca57; box-shadow: 0 0 15px rgba(254, 202, 87, 0.3); }
        .modal-input::placeholder { color: rgba(255, 255, 255, 0.4); }
        .modal-error { font-size: 0.85rem; color: #e94560; margin-bottom: 15px; display: none; }
        .modal-error.show { display: block; }
        .modal-actions { display: flex; gap: 10px; justify-content: center; }
        .modal-btn { padding: 12px 25px; font-size: 0.9rem; font-weight: 600; border: none; border-radius: 25px; cursor: pointer; transition: all 0.3s; }
        .modal-btn.cancel { color: rgba(255, 255, 255, 0.7); background: rgba(255, 255, 255, 0.1); }
        .modal-btn.cancel:hover { background: rgba(255, 255, 255, 0.2); }
        .modal-btn.submit { color: #1a1a1a; background: linear-gradient(135deg, #feca57, #ff9f43); }
        .modal-btn.submit:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(254, 202, 87, 0.4); }

        /* Toast */
        .toast { position: fixed; top: 20px; right: 20px; padding: 15px 25px; border-radius: 12px; font-size: 0.9rem; animation: slide 0.3s; z-index: 2000; }
        .toast.success { background: rgba(76, 175, 80, 0.9); }
        .toast.error { background: rgba(233, 69, 96, 0.9); }
        @keyframes slide { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>
    <canvas id="meteorCanvas"></canvas>

    <div class="container">
        <div class="logo">MONSFAMS</div>
        <div class="subtitle"></div>

        <div class="buttons">
            <a href="free-executor.html" class="btn btn-free">
                <svg class="btn-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                </svg>
                Free Executor
            </a>

            <button class="btn btn-premium" onclick="openPremiumModal()">
                <svg class="btn-icon" fill="currentColor" viewBox="0 0 20 20">
                    <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
                </svg>
                Premium
            </button>

            <a href="#" class="btn btn-tutorial">
                <svg class="btn-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
                </svg>
                Tutorial
            </a>

            <a href="https://discord.gg/a938xZRscf" class="btn btn-discord" target="_blank">
                <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M20.317 4.37a19.791 19.791 0 00-4.885-1.515.074.074 0 00-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 00-5.487 0 12.64 12.64 0 00-.617-1.25.077.077 0 00-.079-.037A19.736 19.736 0 003.677 4.37a.07.07 0 00-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 00.031.057 19.9 19.9 0 005.993 3.03.078.078 0 00.084-.028 14.09 14.09 0 001.226-1.994.076.076 0 00-.041-.106 13.107 13.107 0 01-1.872-.892.077.077 0 00-.008-.128 10.2 10.2 0 00.372-.292.074.074 0 00.077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 00.078.01c.12.098.246.198.373.292a.077.077 0 00.006.127 12.299 12.299 0 01-1.873.892.077.077 0 00-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 00.084.028 19.839 19.839 0 006.002-3.03.077.077 0 00.032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 00-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
                </svg>
                Join Discord
            </a>
        </div>

        <a href="admin.html" class="admin-link">MONSFAMS</a>
    </div>

    <!-- Premium Password Modal -->
    <div class="modal" id="premiumModal">
        <div class="modal-content">
            <div class="modal-icon">⭐</div>
            <h3 class="modal-title">Premium Access</h3>
            <p class="modal-desc">Enter your premium password to continue</p>
            <input type="password" class="modal-input" id="premiumPassword" placeholder="Enter password...">
            <p class="modal-error" id="premiumError">Incorrect password. Please try again.</p>
            <div class="modal-actions">
                <button class="modal-btn cancel" onclick="closePremiumModal()">Cancel</button>
                <button class="modal-btn submit" onclick="checkPremiumPassword()">Continue</button>
            </div>
        </div>
    </div>

    <script>
        // ============ METEOR FALLING EFFECT ============
        const canvas = document.getElementById('meteorCanvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let meteors = [];
        let stars = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // Star class for background
        class Star {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 1.5;
                this.alpha = Math.random() * 0.5 + 0.2;
                this.twinkleSpeed = Math.random() * 0.02 + 0.01;
                this.twinklePhase = Math.random() * Math.PI * 2;
            }

            update() {
                this.twinklePhase += this.twinkleSpeed;
            }

            draw() {
                const alpha = this.alpha + Math.sin(this.twinklePhase) * 0.2;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${Math.max(0, alpha)})`;
                ctx.fill();
            }
        }

        // Meteor class
        class Meteor {
            constructor() {
                this.reset();
            }

            reset() {
                // Start from top-right area
                this.x = Math.random() * width * 1.5 - width * 0.25;
                this.y = -50 - Math.random() * 200;
                this.length = 50 + Math.random() * 100;
                this.speed = 8 + Math.random() * 6;
                this.angle = Math.PI / 4 + (Math.random() - 0.5) * 0.3; // ~45 degrees
                this.thickness = 1 + Math.random() * 1.5;
                this.alpha = 0.4 + Math.random() * 0.4;
                this.color = Math.random() > 0.3 ? '255, 200, 100' : '200, 150, 255'; // Orange or purple tint
                this.particles = [];
                this.trail = [];
                this.active = true;
            }

            update() {
                // Update position
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;

                // Add to trail
                this.trail.push({ x: this.x, y: this.y, alpha: this.alpha });
                if (this.trail.length > 20) {
                    this.trail.shift();
                }

                // Spawn particles occasionally
                if (Math.random() < 0.3) {
                    this.particles.push({
                        x: this.x + Math.random() * 10 - 5,
                        y: this.y + Math.random() * 10 - 5,
                        vx: (Math.random() - 0.5) * 2,
                        vy: (Math.random() - 0.5) * 2 + 1,
                        life: 20 + Math.random() * 20,
                        maxLife: 40,
                        size: 1 + Math.random() * 2
                    });
                }

                // Update particles
                this.particles = this.particles.filter(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life--;
                    return p.life > 0;
                });

                // Check if off screen
                if (this.y > height + 100 || this.x > width + 100) {
                    this.active = false;
                }
            }

            draw() {
                // Draw trail
                for (let i = 0; i < this.trail.length; i++) {
                    const t = this.trail[i];
                    const progress = i / this.trail.length;
                    const alpha = t.alpha * progress * 0.6;
                    const size = this.thickness * progress;

                    ctx.beginPath();
                    ctx.moveTo(t.x, t.y);
                    ctx.lineTo(
                        t.x - Math.cos(this.angle) * this.length * progress,
                        t.y - Math.sin(this.angle) * this.length * progress
                    );
                    ctx.strokeStyle = `rgba(${this.color}, ${alpha})`;
                    ctx.lineWidth = size;
                    ctx.lineCap = 'round';
                    ctx.stroke();
                }

                // Draw head glow
                const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, 15);
                gradient.addColorStop(0, `rgba(${this.color}, ${this.alpha})`);
                gradient.addColorStop(0.5, `rgba(${this.color}, ${this.alpha * 0.3})`);
                gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');

                ctx.beginPath();
                ctx.arc(this.x, this.y, 15, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                // Draw head
                ctx.beginPath();
                ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
                ctx.fill();

                // Draw particles
                this.particles.forEach(p => {
                    const alpha = p.life / p.maxLife;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${this.color}, ${alpha * 0.8})`;
                    ctx.fill();
                });
            }
        }

        // Initialize stars
        for (let i = 0; i < 80; i++) {
            stars.push(new Star());
        }

        // Create initial meteors
        for (let i = 0; i < 4; i++) {
            const meteor = new Meteor();
            meteor.y = Math.random() * height * 0.7 - 200;
            meteor.x = Math.random() * width;
            meteors.push(meteor);
        }

        // Spawn new meteors periodically
        function spawnMeteor() {
            if (meteors.length < 6) {
                meteors.push(new Meteor());
            }
        }
        setInterval(spawnMeteor, 1500 + Math.random() * 2000);

        // Animation loop
        function animate() {
            // Clear canvas (transparent - background handled by CSS)
            ctx.clearRect(0, 0, width, height);

            // Update and draw stars
            stars.forEach(star => {
                star.update();
                star.draw();
            });

            // Update and draw meteors
            meteors = meteors.filter(m => m.active);
            meteors.forEach(meteor => {
                meteor.update();
                meteor.draw();
            });

            requestAnimationFrame(animate);
        }
        animate();

        // ============ PREMIUM MODAL ============
        let PREMIUM_PASSWORD = 'MONSFAMS';
        const SERVER_URL = localStorage.getItem('serverUrl') || '';

        async function loadPremiumPassword() {
            if (!SERVER_URL) return;
            try {
                const res = await fetch(`${SERVER_URL}/api/premium-password`, {
                    headers: { 'x-admin-password': PREMIUM_PASSWORD }
                });
                if (res.ok) {
                    const data = await res.json();
                    PREMIUM_PASSWORD = data.password;
                }
            } catch (err) {
                console.log('Using default premium password');
            }
        }

        if (sessionStorage.getItem('premiumAccess') === 'true') {
            sessionStorage.removeItem('premiumAccess');
        }

        if (sessionStorage.getItem('premiumAccess') === 'true') {
            window.location.href = 'premium-download.html';
        }

        function openPremiumModal() {
            document.getElementById('premiumModal').classList.add('active');
            document.getElementById('premiumPassword').value = '';
            document.getElementById('premiumError').classList.remove('show');
            document.getElementById('premiumPassword').focus();
        }

        function closePremiumModal() {
            document.getElementById('premiumModal').classList.remove('active');
        }

        async function checkPremiumPassword() {
            await loadPremiumPassword();
            const password = document.getElementById('premiumPassword').value;
            if (password === PREMIUM_PASSWORD) {
                sessionStorage.setItem('premiumAccess', 'true');
                closePremiumModal();
                toast('Access granted!', 'success');
                window.location.href = 'premium-download.html';
            } else {
                document.getElementById('premiumError').classList.add('show');
                document.getElementById('premiumPassword').value = '';
                document.getElementById('premiumPassword').focus();
            }
        }

        document.getElementById('premiumPassword').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') checkPremiumPassword();
        });

        document.getElementById('premiumModal').addEventListener('click', function(e) {
            if (e.target === this) closePremiumModal();
        });

        function toast(message, type) {
            const t = document.createElement('div');
            t.className = 'toast ' + type;
            t.textContent = message;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        if (localStorage.getItem('serverUrl')) {
            loadPremiumPassword();
        }
    </script>
</body>
</html>
