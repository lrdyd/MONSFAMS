worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Logs
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  logs/access.log  main;
    error_log   logs/error.log   warn;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # Buffer settings for file uploads
    client_body_buffer_size 100M;
    client_max_body_size 500M;
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    # Upstream to Node.js app
    upstream monsfams {
        server 127.0.0.1:3000;
        keepalive 64;
    }

    # HTTP Server
    server {
        listen 80;
        server_name YOUR_DOMAIN_HERE;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Redirect to HTTPS (uncomment when SSL is ready)
        # return 301 https://$server_name$request_uri;
        # }

        # HTTPS Server (uncomment for SSL)
        # server {
        #     listen 443 ssl http2;
        #     server_name YOUR_DOMAIN_HERE;

        #     # SSL Certificate (Let's Encrypt)
        #     ssl_certificate     C:/certbot/live/YOUR_DOMAIN_HERE/fullchain.pem;
        #     ssl_certificate_key C:/certbot/live/YOUR_DOMAIN_HERE/privkey.pem;

        #     # SSL Settings
        #     ssl_protocols TLSv1.2 TLSv1.3;
        #     ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        #     ssl_prefer_server_ciphers off;
        #     ssl_session_cache shared:SSL:10m;
        #     ssl_session_timeout 1d;

        # Security headers
        # add_header X-Frame-Options "SAMEORIGIN" always;
        # add_header X-Content-Type-Options "nosniff" always;
        # add_header X-XSS-Protection "1; mode=block" always;
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        root C:/MONSFAMS/server/public;
        index index.html;

        # Main application
        location / {
            proxy_pass         http://monsfams;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
            proxy_connect_timeout 60s;
        }

        # Static files - long cache
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg|eot|otf)$ {
            proxy_pass         http://monsfams;
            expires            30d;
            add_header         Cache-Control "public, immutable";
        }

        # File downloads
        location /download/ {
            proxy_pass         http://monsfams;
            proxy_buffering    off;
            proxy_cache        off;
            tcp_nodelay        on;
        }

        # File uploads - larger limits
        client_max_body_size 500M;
        proxy_read_timeout   300s;
        proxy_send_timeout   300s;
        proxy_connect_timeout 75s;

        # Health check
        location /api/status {
            proxy_pass         http://monsfams;
            access_log         off;
        }

        # Block sensitive files
        location ~ /\. {
            deny all;
        }

        location ~ ^/(\.env|package\.json|node_modules) {
            deny all;
            return 404;
        }

        # Don't cache
        location ~* \.(json|xml)$ {
            proxy_pass         http://monsfams;
            add_header         Cache-Control "no-store, no-cache, must-revalidate";
        }
    }

    # HTTP to HTTPS redirect (uncomment when SSL is ready)
    # server {
    #     listen 80;
    #     server_name YOUR_DOMAIN_HERE;
    #     return 301 https://$server_name$request_uri;
    # }
}
